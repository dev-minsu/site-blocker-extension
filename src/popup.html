<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Blocker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1a1a2e;
      background: #f8f9ff;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    /* Toggle Switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-label {
      font-size: 12px;
      font-weight: 500;
      opacity: 0.9;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 24px;
      transition: 0.3s;
    }

    .slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background: rgba(255,255,255,0.6);
    }

    input:checked + .slider::before {
      transform: translateX(20px);
    }

    /* Content */
    .content {
      padding: 16px 20px;
    }

    /* Rules List */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    #rules-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
      max-height: 280px;
      overflow-y: auto;
    }

    .rule-item {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      transition: box-shadow 0.2s;
    }

    .rule-item:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .rule-item.disabled {
      opacity: 0.5;
    }

    .rule-info {
      flex: 1;
      min-width: 0;
    }

    .rule-site {
      font-weight: 600;
      font-size: 14px;
      color: #1a1a2e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rule-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 20px;
      background: #ede9fe;
      color: #6d28d9;
    }

    .badge.time {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .rule-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Small toggle */
    .toggle-sm {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle-sm input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider-sm {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #d1d5db;
      border-radius: 20px;
      transition: 0.3s;
    }

    .slider-sm::before {
      content: '';
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider-sm {
      background: #667eea;
    }

    input:checked + .slider-sm::before {
      transform: translateX(16px);
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #9ca3af;
      font-size: 16px;
      line-height: 1;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    .btn-delete:hover {
      color: #ef4444;
      background: #fee2e2;
    }

    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: #9ca3af;
      font-size: 13px;
    }

    /* Add Form */
    .add-form {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-check {
      display: none;
    }

    .day-label {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: #f3f4f6;
      color: #6b7280;
      transition: background 0.2s, color 0.2s;
      user-select: none;
    }

    .day-check:checked + .day-label {
      background: #667eea;
      color: white;
    }

    .time-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-add {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-add:hover {
      opacity: 0.9;
    }

    .btn-add:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚫 Site Blocker</h1>
    <div class="toggle-wrap">
      <span class="toggle-label">전체</span>
      <label class="toggle">
        <input type="checkbox" id="global-toggle" checked />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="content">
    <div class="section-title">차단 규칙</div>
    <div id="rules-list">
      <div class="empty-state">아직 차단 규칙이 없습니다</div>
    </div>

    <div class="section-title">규칙 추가</div>
    <div class="add-form">
      <div class="form-group">
        <label class="form-label" for="url-input">사이트 URL</label>
        <input
          type="text"
          id="url-input"
          class="form-input"
          placeholder="예: youtube.com"
        />
      </div>

      <div class="form-group">
        <label class="form-label">차단 요일</label>
        <div class="days-grid">
          <input type="checkbox" class="day-check" id="d0" value="0" />
          <label class="day-label" for="d0">일</label>
          <input type="checkbox" class="day-check" id="d1" value="1" checked />
          <label class="day-label" for="d1">월</label>
          <input type="checkbox" class="day-check" id="d2" value="2" checked />
          <label class="day-label" for="d2">화</label>
          <input type="checkbox" class="day-check" id="d3" value="3" checked />
          <label class="day-label" for="d3">수</label>
          <input type="checkbox" class="day-check" id="d4" value="4" checked />
          <label class="day-label" for="d4">목</label>
          <input type="checkbox" class="day-check" id="d5" value="5" checked />
          <label class="day-label" for="d5">금</label>
          <input type="checkbox" class="day-check" id="d6" value="6" />
          <label class="day-label" for="d6">토</label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">차단 시간</label>
        <div class="time-row">
          <input type="time" id="start-time" class="form-input" value="09:00" />
          <input type="time" id="end-time" class="form-input" value="18:00" />
        </div>
      </div>

      <button id="add-btn" class="btn-add">+ 규칙 추가</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
