<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>접근 차단됨</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -250px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(239,68,68,0.1) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 48px 32px;
      max-width: 560px;
      width: 100%;
    }

    /* Icon */
    .icon {
      font-size: 80px;
      margin-bottom: 28px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* Titles */
    .blocked-title {
      font-size: 26px;
      font-weight: 800;
      color: #f87171;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
      line-height: 1.3;
    }

    .blocked-subtitle {
      font-size: 15px;
      color: #64748b;
      margin-bottom: 10px;
    }

    .site-name {
      display: inline-block;
      font-size: 22px;
      font-weight: 700;
      color: #e2e8f0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 4px 16px;
      margin-bottom: 32px;
      letter-spacing: 0.3px;
    }

    /* Cards */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #475569;
      margin-bottom: 8px;
    }

    .schedule-value {
      font-size: 20px;
      font-weight: 700;
      color: #fb923c;
      letter-spacing: -0.3px;
    }

    /* Countdown */
    .countdown-card {
      background: rgba(239,68,68,0.07);
      border: 1px solid rgba(239,68,68,0.18);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 28px;
    }

    .countdown {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
    }

    .time-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 72px;
    }

    .time-number {
      font-size: 48px;
      font-weight: 800;
      color: #f87171;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
    }

    .time-unit {
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .time-sep {
      font-size: 40px;
      font-weight: 800;
      color: #f87171;
      line-height: 1;
      padding-bottom: 18px;
      opacity: 0.6;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.1; }
    }

    /* Motivation */
    .motivation {
      font-size: 15px;
      line-height: 1.75;
      color: #64748b;
      font-style: italic;
      padding: 0 12px;
    }

    .motivation::before { content: '"'; color: #334155; }
    .motivation::after  { content: '"'; color: #334155; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🚫</div>

    <div class="blocked-title" id="blocked-title">현재 이 사이트는 차단되어 있습니다</div>
    <div class="blocked-subtitle" id="blocked-subtitle">지금은 이 사이트에 접근할 수 없습니다.</div>
    <div class="site-name" id="site-name">사이트 로딩 중...</div>

    <div class="card">
      <div class="card-label" id="schedule-label">차단 스케줄</div>
      <div class="schedule-value" id="schedule-value">로딩 중...</div>
    </div>

    <div class="countdown-card">
      <div class="card-label" id="countdown-label">해제까지 남은 시간</div>
      <div class="countdown">
        <div class="time-block">
          <div class="time-number" id="hours">00</div>
          <div class="time-unit" id="hours-unit">시간</div>
        </div>
        <div class="time-sep">:</div>
        <div class="time-block">
          <div class="time-number" id="minutes">00</div>
          <div class="time-unit" id="minutes-unit">분</div>
        </div>
        <div class="time-sep">:</div>
        <div class="time-block">
          <div class="time-number" id="seconds">00</div>
          <div class="time-unit" id="seconds-unit">초</div>
        </div>
      </div>
    </div>

    <div class="motivation" id="motivation">집중력을 유지하세요!</div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
