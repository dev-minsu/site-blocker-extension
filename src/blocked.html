<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사이트 차단됨</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #6c63ff;
      --accent-dim: rgba(108, 99, 255, 0.15);
      --text-primary: #e8eaf0;
      --text-secondary: #8b8fa8;
      --text-muted: #555870;
      --danger: #ff6b6b;
      --success: #51cf66;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(108, 99, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Icon */
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.5rem;
      background: var(--accent-dim);
      border: 1px solid rgba(108, 99, 255, 0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    /* Site name */
    .site-name {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
    }

    .blocked-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--danger);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 2rem;
    }

    /* Schedule card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .card-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .schedule-text {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* Countdown */
    .countdown-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .countdown-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
    }

    .countdown-digits {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .digit-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .digit-value {
      font-size: 2.5rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      line-height: 1;
      min-width: 3rem;
    }

    .digit-unit {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .digit-sep {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-muted);
      line-height: 1;
      margin-bottom: 1.2rem;
    }

    /* Motivation */
    .motivation {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.6;
      font-style: italic;
    }

    .motivation::before,
    .motivation::after {
      content: '"';
      color: var(--accent);
      font-style: normal;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🚫</div>
    <div class="site-name" id="siteName">사이트</div>
    <div class="blocked-label">차단됨</div>

    <div class="card">
      <div class="card-label">차단 스케줄</div>
      <div class="schedule-text" id="scheduleText">로딩 중...</div>
    </div>

    <div class="countdown-card">
      <div class="countdown-label">차단 해제까지</div>
      <div class="countdown-digits">
        <div class="digit-group">
          <span class="digit-value" id="cdHours">00</span>
          <span class="digit-unit">시간</span>
        </div>
        <span class="digit-sep">:</span>
        <div class="digit-group">
          <span class="digit-value" id="cdMinutes">00</span>
          <span class="digit-unit">분</span>
        </div>
        <span class="digit-sep">:</span>
        <div class="digit-group">
          <span class="digit-value" id="cdSeconds">00</span>
          <span class="digit-unit">초</span>
        </div>
      </div>
    </div>

    <div class="motivation" id="motivationText">지금 이 순간에 집중하세요. 당신은 더 중요한 일을 하고 있습니다.</div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
