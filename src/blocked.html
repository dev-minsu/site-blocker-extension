<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>접근 차단됨</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Background glow effect */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(239,68,68,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 40px 32px;
      max-width: 520px;
      width: 100%;
    }

    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      color: #f87171;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .site-name {
      font-size: 20px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    /* Schedule card */
    .schedule-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .schedule-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .schedule-value {
      font-size: 18px;
      font-weight: 700;
      color: #fb923c;
    }

    /* Countdown */
    .countdown-wrap {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 32px;
    }

    .countdown-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 10px;
    }

    .countdown {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .time-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .time-number {
      font-size: 40px;
      font-weight: 800;
      color: #f87171;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      min-width: 60px;
      text-align: center;
    }

    .time-unit {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
    }

    .time-sep {
      font-size: 36px;
      font-weight: 800;
      color: #f87171;
      line-height: 1;
      margin-bottom: 18px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* Motivation */
    .motivation {
      font-size: 15px;
      line-height: 1.7;
      color: #94a3b8;
      font-style: italic;
      padding: 0 8px;
    }

    .motivation::before { content: '"'; }
    .motivation::after { content: '"'; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🚫</div>
    <div class="title">접근이 차단되었습니다</div>
    <div class="site-name" id="site-name">사이트 로딩 중...</div>

    <div class="schedule-card">
      <div class="schedule-label">차단 스케줄</div>
      <div class="schedule-value" id="schedule-value">로딩 중...</div>
    </div>

    <div class="countdown-wrap">
      <div class="countdown-label">해제까지 남은 시간</div>
      <div class="countdown">
        <div class="time-block">
          <div class="time-number" id="hours">00</div>
          <div class="time-unit">시간</div>
        </div>
        <div class="time-sep">:</div>
        <div class="time-block">
          <div class="time-number" id="minutes">00</div>
          <div class="time-unit">분</div>
        </div>
        <div class="time-sep">:</div>
        <div class="time-block">
          <div class="time-number" id="seconds">00</div>
          <div class="time-unit">초</div>
        </div>
      </div>
    </div>

    <div class="motivation" id="motivation">집중력을 유지하세요!</div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
